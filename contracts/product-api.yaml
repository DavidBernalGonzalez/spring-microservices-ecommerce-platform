# Contract: Product API (consumed by Order Service)
# Source of truth for GET /api/v1/products/{id} response
openapi: 3.0.3
info:
  title: Product API
  description: Product service API - contract for Order service consumer
  version: 1.0.0

paths:
  /api/v1/products/{id}:
    get:
      summary: Get product by ID
      operationId: getProductById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Product not found

components:
  schemas:
    Product:
      type: object
      required:
        - id
        - name
        - price
        - status
      properties:
        id:
          type: integer
          format: int64
        sku:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: decimal
        categoryId:
          type: integer
          format: int64
        categoryName:
          type: string
        taxRate:
          type: number
          format: decimal
        status:
          type: string
          enum: [ACTIVE, INACTIVE, OUT_OF_STOCK, DISCONTINUED]
