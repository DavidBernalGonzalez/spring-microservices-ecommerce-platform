# Application configuration for Order Service
spring.application.name=order-service
server.port=8082

# Data base information
db.name=ms_orders
# 3308 for docker and 3306 for local
db.port=3306

# Database credentials
# For docker, use the following credentials: davidBernal and admin1234
spring.datasource.username=admin
spring.datasource.password=admin

# Swagger configuration
springdoc.swagger-ui.path=/index.html

# Disable Open Session in View to prevent lazy loading issues
spring.jpa.open-in-view=false

# JPA and Hibernate configuration (create, update, validate, none)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.datasource.url=jdbc:mysql://localhost:${db.port}/${db.name}
