# Application configuration for Order Service
spring.application.name=order-service
server.port=8082

# Data base information
db.name=ms_orders
# 3308 for docker and 3306 for local
db.port=3308

# Database credentials
# For docker, use the following credentials: davidBernal and admin1234
# For local development, you can use your own credentials or the same ones if you have a local MySQL instance set up with those credentials.
spring.datasource.username=davidBernal
spring.datasource.password=admin1234

# Product service URL (for Feign client)
services.product.base-url=http://localhost:8081

# Inventory service URL (for Feign client)
services.inventory.base-url=http://localhost:8083

# Actuator - health checks
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Swagger configuration
springdoc.swagger-ui.path=/index.html

# Disable Open Session in View to prevent lazy loading issues
spring.jpa.open-in-view=false

# JPA and Hibernate configuration (create, update, validate, none)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.datasource.url=jdbc:mysql://localhost:${db.port}/${db.name}
